<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anton Szilvay - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #000;
        }

        /* Header */
        header {
            padding: 40px 20px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: #ffffff;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        nav {
            display: flex;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.6;
        }

        /* Main Container */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .portfolio-title {
            font-size: 32px;
            margin-bottom: 60px;
            font-weight: 600;
        }

        /* Masonry Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            grid-auto-rows: auto;
        }

        .portfolio-item {
            position: relative;
            overflow: hidden;
            background: #f5f5f5;
            aspect-ratio: 1;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .portfolio-item:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .portfolio-title-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 500;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .portfolio-item:hover .portfolio-title-overlay {
            opacity: 1;
        }

        /* Varying heights for masonry effect */
        .portfolio-item:nth-child(2) {
            aspect-ratio: 3/4;
        }

        .portfolio-item:nth-child(3) {
            aspect-ratio: 3/4;
        }

        .portfolio-item:nth-child(6) {
            aspect-ratio: 3/4;
        }

        .portfolio-item:nth-child(8) {
            aspect-ratio: 3/4;
        }

        .portfolio-item:nth-child(10) {
            aspect-ratio: 3/4;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            padding: 20px;
        }

        .lightbox.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-content {
            display: flex;
            align-items: center;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
        }

        .lightbox-image {
            flex: 1;
            max-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-image img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }

        .lightbox-info {
            flex: 0 0 250px;
            color: white;
        }

        .lightbox-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 36px;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }

        .lightbox-close:hover {
            opacity: 0.6;
        }

        /* Footer */
        footer {
            background: #f9f9f9;
            padding: 60px 20px;
            border-top: 1px solid #f0f0f0;
            margin-top: 80px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .contact-section {
            margin-bottom: 40px;
        }

        .contact-section h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-section p {
            font-size: 16px;
            line-height: 1.6;
        }

        .contact-section a {
            color: #000;
            text-decoration: none;
            border-bottom: 1px solid #000;
        }

        .contact-section a:hover {
            opacity: 0.6;
        }

        .social-links {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #000;
            text-decoration: none;
            color: #000;
            transition: background 0.3s;
            font-size: 14px;
        }

        .social-links a:hover {
            background: #000;
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 25px 15px;
            }

            .header-content {
                flex-direction: column;
                gap: 20px;
            }

            h1 {
                font-size: 22px;
            }

            nav {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }

            nav a {
                font-size: 13px;
            }

            main {
                padding: 40px 15px;
            }

            .portfolio-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .portfolio-title {
                font-size: 22px;
                margin-bottom: 40px;
            }

            .portfolio-title-overlay {
                padding: 15px 12px;
                font-size: 13px;
            }

            .lightbox-content {
                flex-direction: column;
                gap: 20px;
            }

            .lightbox-info {
                flex: 0 0 auto;
                width: 100%;
            }

            .contact-section {
                margin-bottom: 30px;
            }

            .contact-section h3 {
                font-size: 13px;
                margin-bottom: 12px;
            }

            .contact-section p {
                font-size: 16px;
            }

            .social-links {
                gap: 15px;
            }

            .social-links a {
                width: 50px;
                height: 50px;
                font-size: 14px;
                border-width: 2px;
            }

            footer {
                padding: 40px 15px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 20px;
            }

            .portfolio-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .portfolio-title {
                font-size: 20px;
                margin-bottom: 30px;
            }

            nav a {
                font-size: 12px;
            }

            .contact-section p {
                font-size: 15px;
            }

            .social-links a {
                width: 55px;
                height: 55px;
                font-size: 13px;
            }

            .lightbox-image img {
                max-height: 50vh;
            }

            .lightbox-title {
                font-size: 18px;
            }
        }

        /* Loading animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .portfolio-item {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .portfolio-item:nth-child(1) { animation-delay: 0.05s; }
        .portfolio-item:nth-child(2) { animation-delay: 0.1s; }
        .portfolio-item:nth-child(3) { animation-delay: 0.15s; }
        .portfolio-item:nth-child(4) { animation-delay: 0.2s; }
        .portfolio-item:nth-child(5) { animation-delay: 0.25s; }
        .portfolio-item:nth-child(6) { animation-delay: 0.3s; }
        .portfolio-item:nth-child(7) { animation-delay: 0.35s; }
        .portfolio-item:nth-child(8) { animation-delay: 0.4s; }
        .portfolio-item:nth-child(9) { animation-delay: 0.45s; }
        .portfolio-item:nth-child(10) { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>ANTON SZILVAY</h1>
            <nav>
                <a href="portfolio.html">Portfolio</a>
                <a href="bio.html">Bio</a>
                <a href="coming-soon.html">Coming Soon</a>
            </nav>
        </div>
    </header>

    <main>
        <h2 class="portfolio-title">Portfolio / Work</h2>
        
        <div class="portfolio-grid">
            <div class="portfolio-item" data-title="Boy with a dream">
                <img src="artwork_1.jpg" alt="Boy with a dream">
                <div class="portfolio-title-overlay">Boy with a dream</div>
            </div>
            <div class="portfolio-item" data-title="Broken Stare">
                <img src="artwork_2.jpg" alt="Broken Stare">
                <div class="portfolio-title-overlay">Broken Stare</div>
            </div>
            <div class="portfolio-item" data-title="Eye infection">
                <img src="artwork_3.jpg" alt="Eye infection">
                <div class="portfolio-title-overlay">Eye infection</div>
            </div>
            <div class="portfolio-item" data-title="Fluctuations">
                <img src="artwork_4.jpg" alt="Fluctuations">
                <div class="portfolio-title-overlay">Fluctuations</div>
            </div>
            <div class="portfolio-item" data-title="Gnash">
                <img src="artwork_5.jpg" alt="Gnash">
                <div class="portfolio-title-overlay">Gnash</div>
            </div>
            <div class="portfolio-item" data-title="Morning breath">
                <img src="artwork_6.jpg" alt="Morning breath">
                <div class="portfolio-title-overlay">Morning breath</div>
            </div>
            <div class="portfolio-item" data-title="Untitled">
                <img src="artwork_7.jpg" alt="Untitled">
                <div class="portfolio-title-overlay">Untitled</div>
            </div>
            <div class="portfolio-item" data-title="Untitled">
                <img src="artwork_8.jpg" alt="Untitled">
                <div class="portfolio-title-overlay">Untitled</div>
            </div>
            <div class="portfolio-item" data-title="Untitled">
                <img src="artwork_9.jpg" alt="Untitled">
                <div class="portfolio-title-overlay">Untitled</div>
            </div>
            <div class="portfolio-item" data-title="Untitled">
                <img src="artwork_10.jpg" alt="Untitled">
                <div class="portfolio-title-overlay">Untitled</div>
            </div>
        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <div class="lightbox-content">
            <div class="lightbox-image">
                <img id="lightboxImage" src="" alt="">
            </div>
            <div class="lightbox-info">
                <h3 class="lightbox-title" id="lightboxTitle"></h3>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="contact-section">
                <h3>Get in Touch</h3>
                <p>Email: <a href="mailto:anton.szilvay@gmail.com">anton.szilvay@gmail.com</a></p>
            </div>
            
            <div class="contact-section">
                <h3>Follow</h3>
                <div class="social-links">
                    <a href="https://www.instagram.com/anton.szilvay/" target="_blank" title="Instagram">IG</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxTitle = document.getElementById('lightboxTitle');
        const lightboxClose = document.getElementById('lightboxClose');
        const portfolioItems = document.querySelectorAll('.portfolio-item');

        // Open lightbox
        portfolioItems.forEach(item => {
            item.addEventListener('click', function() {
                const title = this.getAttribute('data-title');
                const imageSrc = this.querySelector('img').src;
                
                lightboxTitle.textContent = title;
                lightboxImage.src = imageSrc;
                lightbox.classList.add('active');
            });
        });

        // Close lightbox
        lightboxClose.addEventListener('click', function() {
            lightbox.classList.remove('active');
        });

        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
        });

        // Close with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                lightbox.classList.remove('active');
            }
        });
    </script>
</body>
</html>
